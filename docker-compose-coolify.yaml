
services:
  nuxt-app:
    image: ghcr.io/spektroaudio/ngen-web-manager:latest
    pull_policy: always
    container_name: nuxt-app
    ports:
      - "3110:3110"
    environment:
      - PORT=3110
      - HOST=0.0.0.0
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nuxt-app-http.rule=Host(`ngen-manager.spektroaudio.com`)"
      - "traefik.http.routers.nuxt-app-http.entrypoints=http"
      - "traefik.http.routers.nuxt-app-http.priority=9999"
      - "traefik.http.routers.nuxt-app-http.middlewares=gzip"
      - "traefik.http.routers.nuxt-app-https.rule=Host(`ngen-manager.spektroaudio.com`)"
      - "traefik.http.routers.nuxt-app-https.entrypoints=https"
      - "traefik.http.routers.nuxt-app-https.tls=true"
      - "traefik.http.routers.nuxt-app-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.nuxt-app.loadbalancer.server.port=3110"
      - "coolify.managed=true"

networks:
  coolify:
    name: coolify
    external: true
