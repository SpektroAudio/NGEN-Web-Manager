
services:
  nuxt-app:
    image: ghcr.io/spektroaudio/ngen-web-manager:latest
    pull_policy: always
    container_name: nuxt-app
    ports:
      - "3110:3110"
    environment:
      - PORT=3110
      - HOST=0.0.0.0
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.http.services.nuxt-app.loadbalancer.server.port=3110"

networks:
  coolify:
    name: coolify
    external: true
