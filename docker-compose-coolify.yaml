
services:
  nuxt-app:
    image: ghcr.io/spektroaudio/ngen-web-manager:latest
    pull_policy: always
    container_name: nuxt-app
    environment:
      - PORT=3110
      - HOST=0.0.0.0
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.ngen-manager.rule=Host(`ngen-manager.spektroaudio.com`)"
      - "traefik.http.routers.ngen-manager.entrypoints=http"
      - "traefik.http.routers.ngen-manager.middlewares=https-redirect"
      - "traefik.http.routers.ngen-manager-secure.rule=Host(`ngen-manager.spektroaudio.com`)"
      - "traefik.http.routers.ngen-manager-secure.entrypoints=https"
      - "traefik.http.routers.ngen-manager-secure.tls=true"
      - "traefik.http.routers.ngen-manager-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ngen-manager-secure.service=ngen-manager"
      - "traefik.http.services.ngen-manager.loadbalancer.server.port=3110"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"

networks:
  coolify:
    name: coolify
    external: true
